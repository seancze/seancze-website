<div
  [ngClass]="{ overlay: isMagicMode, 'overlay-done': isTypewriterDone }"
  (click)="skipTypewriter()"
>
  <div class="magic-typewriter-container">
    <span id="magic-typewriter"></span>
    <p *ngIf="isMagicMode && !isTypewriterDone">(click anywhere to skip)</p>
  </div>
</div>
<app-hero id="home" [ngClass]="{ 'magic-mode-global': isMagicMode }"></app-hero>

<div id="about" [ngClass]="{ 'magic-mode-global': isMagicMode }">
  <nav class="scrolled" [ngClass]="{ 'magic-mode-global': isMagicMode }">
    <a href="#home">
      {{ !mobile ? "Home" : "" }}

      <fa-icon [icon]="faHome" *ngIf="mobile" class="fa-lg"></fa-icon>
    </a>
    <a href="#about"
      >{{ !mobile ? "About" : "" }}
      <fa-icon [icon]="faAddressCard" *ngIf="mobile" class="fa-lg"></fa-icon>
    </a>
    <a href="#projects"
      >{{ !mobile ? "Projects" : "" }}
      <fa-icon [icon]="faFolderOpen" *ngIf="mobile" class="fa-lg"></fa-icon>
    </a>
    <div class="slider-container">
      <mat-slide-toggle [formControl]="toggleControl" class="mr-8">
      </mat-slide-toggle>
      <fa-icon [icon]="faHatWizard" class="fa-lg" id="wizard-hat"></fa-icon>
    </div>
  </nav>
  <div class="app-body">
    <app-about></app-about>
    <app-mischiefs *ngIf="isMagicMode"></app-mischiefs>
    <app-skills *ngIf="!isMagicMode"></app-skills>
    <app-projects id="projects"></app-projects>
  </div>
</div>
