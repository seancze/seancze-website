<h1>Mischiefs</h1>
<div class="mischiefs-container">
  <ng-image-slider
    [images]="mischiefs"
    [infinite]="true"
    [autoSlide]="true"
    [imageSize]="
      mobile ? { width: '97%' } : { width: '450px', height: '375px' }
    "
    [imagePopup]="true"
    slideImage="1"
  ></ng-image-slider>
</div>
